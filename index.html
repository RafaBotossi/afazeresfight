<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Fight</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game" id="game">
    <section class="stage" id="stage" aria-label="Placar de afazeres domesticos">
      <div class="hud" aria-live="polite">
        <article class="fighter fighter-one">
          <div class="life-shell">
            <div class="life-segments" id="segments1"></div>
            <div class="life-fill" id="lifeBar1"></div>
          </div>
          <span class="sr-only">Vida jogador 1: <span id="lifeValue1">10</span> de 10</span>
        </article>

        <article class="fighter fighter-two">
          <div class="life-shell">
            <div class="life-segments" id="segments2"></div>
            <div class="life-fill" id="lifeBar2"></div>
          </div>
          <span class="sr-only">Vida jogador 2: <span id="lifeValue2">10</span> de 10</span>
        </article>
      </div>

      <aside class="trash-talk trash-talk-left" id="trashTalkLeft" aria-live="polite"></aside>
      <aside class="trash-talk trash-talk-right" id="trashTalkRight" aria-live="polite"></aside>

      <div class="tap-start" id="tapStart">Clique para soltar a trilha</div>

      <div class="ko-layer" id="koLayer">
        <img src="assets/ko.png" alt="KO" />
      </div>

      <div class="victory-layer" id="victoryLayer">
        <img id="victoryImage" src="" alt="Vencedor" />
        <strong class="countdown-only" id="countdown">10</strong>
      </div>
    </section>

    <section class="controls" aria-label="Controles">
      <button class="point-button p1" id="pointPlayer1" type="button">
        <span>Jogador 1</span>
        GANHOU 1 Ponto
      </button>

      <label class="volume-control" for="volumeRange">
        <span>Som <b id="volumeLabel">5%</b></span>
        <input id="volumeRange" type="range" min="0" max="100" value="5" />
      </label>

      <button class="point-button p2" id="pointPlayer2" type="button">
        <span>Jogador 2</span>
        GANHOU 1 Ponto
      </button>
    </section>

    <audio id="music" src="https://media.githubusercontent.com/media/RafaBotossi/afazeresfight/main/assets/music.mp3" loop preload="auto" playsinline></audio>
    <audio id="koSound" src="assets/KO.mp3" preload="auto"></audio>
    <audio id="continueSound" src="assets/continue.mp3" preload="auto"></audio>
  </main>

  <script src="script.js"></script>
</body>
</html>
